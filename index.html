<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCC Visual Layout — Sawmill Electrical</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--surface:#0d1420;--card:#111b28;
  --border:#1a2d42;--border-lit:#2a4060;
  --accent:#f59e0b;--adim:rgba(245,158,11,.12);
  --blue:#38bdf8;--bdim:rgba(56,189,248,.1);
  --green:#22c55e;--gdim:rgba(34,197,94,.1);
  --red:#ef4444;--rdim:rgba(239,68,68,.1);
  --purple:#a78bfa;--yellow:#fde047;
  --text:#cdd9e8;--muted:#4a6280;--muted2:#2a3d52;
  --mono:'Share Tech Mono',monospace;
  --head:'Rajdhani',sans-serif;
  --body:'Barlow',sans-serif;
  --unit:48px; /* 1 bucket height unit */
  --col-w:130px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--body);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(56,189,248,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(56,189,248,.02) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:48px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;position:relative;}
.tb-logo{font-family:var(--head);font-weight:700;font-size:1rem;letter-spacing:.05em;text-transform:uppercase;}
.tb-logo span{color:var(--accent);}
.tb-sep{flex:1;}
.tb-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);}
.tb-btn.active{border-color:var(--blue);color:var(--blue);background:var(--bdim);}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-mcc-sel{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;margin-bottom:8px;}
.sb-mcc-sel:focus{border-color:var(--accent);}
.sb-search{display:flex;gap:6px;}
.sb-search input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:6px 9px;outline:none;}
.sb-search input:focus{border-color:var(--blue);}
.sb-search select{background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:10px;padding:6px 6px;outline:none;}

.bucket-list{flex:1;overflow-y:auto;padding:8px 0;}
.bucket-list::-webkit-scrollbar{width:3px;}
.bucket-list::-webkit-scrollbar-thumb{background:var(--border-lit);}

/* bucket list item */
.bl-item{border-bottom:1px solid rgba(26,45,66,.4);cursor:pointer;transition:background .1s;}
.bl-item:hover{background:rgba(56,189,248,.03);}
.bl-item.active{background:var(--bdim);border-left:2px solid var(--blue);}
.bl-header{display:flex;align-items:center;gap:8px;padding:8px 14px;}
.bl-pos{font-family:var(--mono);font-size:11px;color:var(--accent);min-width:32px;}
.bl-desc{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bl-meta{font-family:var(--mono);font-size:9px;color:var(--muted);}
.bl-chevron{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.bl-item.expanded .bl-chevron{transform:rotate(90deg);}
.bl-children{display:none;padding:0 14px 8px 40px;background:rgba(0,0,0,.15);}
.bl-item.expanded .bl-children{display:block;}
.bl-child{display:flex;align-items:center;gap:6px;padding:4px 0;
  font-family:var(--mono);font-size:10px;color:var(--muted);border-bottom:1px solid rgba(26,45,66,.3);}
.bl-child:last-child{border:none;}
.bl-child-icon{font-size:12px;flex-shrink:0;}
.bl-child-name{flex:1;color:var(--text);font-size:11px;}
.bl-child-edit{cursor:pointer;color:var(--muted);padding:2px 4px;transition:color .15s;font-size:10px;}
.bl-child-edit:hover{color:var(--blue);}
.bl-add-child{display:flex;align-items:center;gap:6px;padding:5px 0;margin-top:4px;
  cursor:pointer;color:var(--green);font-family:var(--mono);font-size:10px;opacity:.7;}
.bl-add-child:hover{opacity:1;}

.no-buckets{padding:32px 14px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);}

/* ── MAIN PANEL ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* MCC VISUAL */
.mcc-wrap{flex:1;overflow:auto;padding:20px;position:relative;}
.mcc-wrap::-webkit-scrollbar{width:6px;height:6px;}
.mcc-wrap::-webkit-scrollbar-thumb{background:var(--border-lit);}

.mcc-title{font-family:var(--head);font-weight:700;font-size:1.3rem;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:4px;}
.mcc-title span{color:var(--accent);}
.mcc-subtitle{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:16px;letter-spacing:.06em;}

.mcc-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.mcc-ctrl-label{font-family:var(--mono);font-size:10px;color:var(--muted);}
.mcc-ctrl-input{background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none;width:60px;}
.mcc-ctrl-input:focus{border-color:var(--accent);}

/* MCC CABINET */
.mcc-cabinet{display:flex;gap:0;border:2px solid var(--border-lit);background:var(--card);
  padding:12px;gap:4px;position:relative;width:fit-content;min-width:300px;}
.mcc-cabinet-label{position:absolute;top:-22px;left:0;font-family:var(--mono);font-size:10px;
  color:var(--muted);letter-spacing:.08em;}

/* column */
.mcc-col{display:flex;flex-direction:column;gap:3px;position:relative;}
.mcc-col-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;
  padding:2px 0 4px;letter-spacing:.06em;}

/* bucket cell */
.mcc-bucket{
  width:var(--col-w);
  background:#0e1824;
  border:1px solid var(--border);
  cursor:pointer;
  transition:all .15s;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:3px 6px;
}
.mcc-bucket:hover{border-color:var(--blue);background:#112030;z-index:2;}
.mcc-bucket.highlighted{
  border-color:var(--accent) !important;
  background:var(--adim) !important;
  box-shadow:0 0 12px rgba(245,158,11,.3);
  z-index:3;
}
.mcc-bucket.has-children{border-left:3px solid var(--green);}
.mcc-bucket.vfd{border-left:3px solid var(--blue);}
.mcc-bucket.empty-slot{background:#080c10;border:1px dashed var(--muted2);cursor:default;}
.mcc-bucket.empty-slot:hover{border-color:var(--muted2);background:#080c10;}

.mb-pos{font-family:var(--mono);font-size:8px;color:var(--muted);line-height:1;}
.mb-desc{font-size:10px;color:var(--text);line-height:1.2;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.mb-hp{font-family:var(--mono);font-size:8px;color:var(--accent);line-height:1;margin-top:1px;}
.mb-indicator{position:absolute;right:4px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:2px;align-items:flex-end;}
.mb-dot{width:5px;height:5px;border-radius:50%;}

/* DETAIL PANEL */
.detail-panel{width:320px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .2s;}
.detail-panel.collapsed{width:0;border:none;}
.dp-head{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dp-pos{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:3px;}
.dp-desc{font-family:var(--head);font-weight:700;font-size:1rem;text-transform:uppercase;
  letter-spacing:.04em;line-height:1.1;}
.dp-mcc{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px;}
.dp-body{flex:1;overflow-y:auto;padding:12px 16px;}
.dp-body::-webkit-scrollbar{width:3px;}
.dp-body::-webkit-scrollbar-thumb{background:var(--border-lit);}
.dp-sec{font-family:var(--mono);font-size:9px;color:var(--blue);letter-spacing:.1em;
  margin:12px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.dp-sec:first-child{margin-top:0;}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;
  border-bottom:1px solid rgba(26,45,66,.3);}
.dp-row:last-child{border:none;}
.dp-key{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.05em;}
.dp-val{font-family:var(--mono);font-size:10px;color:var(--text);}
.dp-val.editable{cursor:pointer;border-bottom:1px dashed var(--border-lit);padding-bottom:1px;}
.dp-val.editable:hover{color:var(--accent);border-color:var(--accent);}
.dp-val input{background:transparent;border:none;border-bottom:1px solid var(--accent);
  color:var(--accent);font-family:var(--mono);font-size:10px;outline:none;width:100%;text-align:right;}

/* child items in detail */
.dp-child{background:var(--card);border:1px solid var(--border);margin-bottom:6px;overflow:hidden;}
.dp-child-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;}
.dp-child-hdr:hover{background:rgba(56,189,248,.04);}
.dp-child-icon{font-size:14px;}
.dp-child-name{flex:1;font-size:12px;font-weight:500;}
.dp-child-type{font-family:var(--mono);font-size:8px;padding:2px 6px;border:1px solid;letter-spacing:.04em;}
.dp-child-body{display:none;padding:8px 10px;border-top:1px solid var(--border);}
.dp-child.open .dp-child-body{display:block;}
.dp-child-row{display:flex;justify-content:space-between;padding:3px 0;
  border-bottom:1px solid rgba(26,45,66,.25);font-size:11px;}
.dp-child-row:last-child{border:none;}
.dp-child-key{color:var(--muted);font-family:var(--mono);font-size:9px;}
.dp-child-val{color:var(--text);}

.dp-add-btn{width:100%;background:transparent;border:1px dashed var(--border-lit);color:var(--muted);
  font-family:var(--mono);font-size:10px;padding:7px;cursor:pointer;transition:all .15s;letter-spacing:.06em;margin-top:6px;}
.dp-add-btn:hover{border-color:var(--green);color:var(--green);}

.dp-height-ctrl{display:flex;align-items:center;gap:6px;}
.dp-height-ctrl button{background:var(--card);border:1px solid var(--border);color:var(--text);
  width:22px;height:22px;cursor:pointer;font-size:13px;line-height:1;transition:all .15s;}
.dp-height-ctrl button:hover{border-color:var(--accent);color:var(--accent);}
.dp-height-val{font-family:var(--mono);font-size:11px;color:var(--accent);min-width:16px;text-align:center;}

.dp-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;
  padding:2px 6px;transition:color .15s;margin-left:auto;}
.dp-close:hover{color:var(--red);}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);padding:22px;
  width:360px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--head);font-weight:700;font-size:1rem;text-transform:uppercase;
  letter-spacing:.05em;color:var(--blue);margin-bottom:14px;}
.mf{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.mf label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;}
.mf input,.mf select,.mf textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);
  font-family:var(--body);font-size:12px;padding:6px 9px;outline:none;width:100%;}
.mf input:focus,.mf select:focus{border-color:var(--accent);}
.mf textarea{resize:vertical;min-height:50px;}
.modal-acts{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.mbtn{font-family:var(--head);font-weight:700;font-size:.78rem;letter-spacing:.07em;
  text-transform:uppercase;padding:7px 16px;border:none;cursor:pointer;transition:all .15s;}
.mbtn-p{background:var(--accent);color:#000;}
.mbtn-p:hover{background:#fbbf24;}
.mbtn-s{background:transparent;border:1px solid var(--border-lit);color:var(--text);}
.mbtn-s:hover{border-color:var(--blue);color:var(--blue);}
.mbtn-d{background:transparent;border:1px solid var(--red);color:var(--red);}
.mbtn-d:hover{background:var(--rdim);}

/* TYPE COLORS */
.type-mtr{color:#f59e0b;border-color:rgba(245,158,11,.4);}
.type-vfd{color:#38bdf8;border-color:rgba(56,189,248,.4);}
.type-ld {color:#22c55e;border-color:rgba(34,197,94,.4);}
.type-pnl{color:#a78bfa;border-color:rgba(167,139,250,.4);}
.type-jb {color:#94a3b8;border-color:rgba(148,163,184,.4);}
.type-xfmr{color:#fde047;border-color:rgba(253,224,71,.4);}
.type-spl{color:#fb923c;border-color:rgba(251,146,60,.4);}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--green);
  color:var(--green);font-family:var(--mono);font-size:10px;padding:9px 14px;
  opacity:0;transform:translateY(6px);transition:all .25s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:900px){
  .detail-panel{position:fixed;right:0;top:48px;bottom:0;z-index:50;width:300px !important;}
  .detail-panel.collapsed{width:0 !important;}
}
@media(max-width:600px){
  .sidebar{width:240px;}
  --col-w:100px;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-logo">Sawmill <span>MCC</span> Visual</div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="exportData()">↓ Export JSON</button>
  <button class="tb-btn" onclick="importData()">↑ Import</button>
  <button class="tb-btn active" id="btn-legend" onclick="toggleLegend()">Legend</button>
</div>

<!-- LAYOUT -->
<div class="layout">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sb-head">
    <select class="sb-mcc-sel" id="mcc-sel" onchange="selectMCC(this.value)">
      <option value="">— Select MCC —</option>
    </select>
    <div class="sb-search">
      <input type="text" id="sb-q" placeholder="Search buckets..." oninput="renderList()">
      <select id="sb-filter" onchange="renderList()">
        <option value="">All</option>
        <option value="MTR">Motor</option>
        <option value="VFD">VFD</option>
        <option value="LD">Disconnect</option>
        <option value="PNL">Panel</option>
      </select>
    </div>
  </div>
  <div class="bucket-list" id="bucket-list">
    <div class="no-buckets">Select an MCC to view buckets</div>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="mcc-wrap" id="mcc-wrap">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);font-family:var(--mono);font-size:12px;gap:10px;">
      <div style="font-size:40px;opacity:.2">⚡</div>
      <div>Select an MCC from the left panel</div>
    </div>
  </div>
</div>

<!-- ── DETAIL PANEL ── -->
<div class="detail-panel collapsed" id="detail-panel">
  <div class="dp-head">
    <div style="display:flex;align-items:flex-start">
      <div style="flex:1">
        <div class="dp-pos" id="dp-pos">—</div>
        <div class="dp-desc" id="dp-desc">—</div>
        <div class="dp-mcc" id="dp-mcc">—</div>
      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

</div><!-- layout -->

<!-- ADD CHILD MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-title" id="add-modal-title">Add Equipment</div>
    <div class="mf">
      <label>Equipment Type</label>
      <select id="child-type" onchange="updateChildFields()">
        <option value="MTR">🔴 Motor</option>
        <option value="VFD">🔵 VFD Drive</option>
        <option value="LD">🟢 Local Disconnect</option>
        <option value="PNL">🟣 Panel / Control</option>
        <option value="JB">⚪ Junction Box</option>
        <option value="XFMR">🟡 Transformer</option>
        <option value="SPL">🟠 Splitter</option>
      </select>
    </div>
    <div class="mf">
      <label>Name / Description</label>
      <input type="text" id="child-name" placeholder="e.g. Debarker 5 Feed Motor">
    </div>
    <div id="child-fields"></div>
    <div class="modal-acts">
      <button class="mbtn mbtn-s" onclick="closeAddModal()">Cancel</button>
      <button class="mbtn mbtn-d" id="btn-del-child" style="display:none" onclick="deleteChild()">Delete</button>
      <button class="mbtn mbtn-p" onclick="saveChild()">Save</button>
    </div>
  </div>
</div>

<!-- LEGEND -->
<div class="modal-bg" id="legend-modal">
  <div class="modal" style="width:280px">
    <div class="modal-title">Legend</div>
    <div style="display:flex;flex-direction:column;gap:8px;font-family:var(--mono);font-size:11px;">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border-left:3px solid var(--green);background:var(--card)"></div>Has child equipment</div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border-left:3px solid var(--blue);background:var(--card)"></div>Has VFD</div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border:1px solid var(--accent);background:var(--adim)"></div>Selected bucket</div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border:1px dashed var(--muted2);background:#080c10"></div>Empty slot</div>
      <hr style="border-color:var(--border);margin:4px 0">
      <div><span class="dp-child-type type-mtr">MTR</span> Motor</div>
      <div><span class="dp-child-type type-vfd">VFD</span> VFD Drive</div>
      <div><span class="dp-child-type type-ld">LD</span> Local Disconnect</div>
      <div><span class="dp-child-type type-pnl">PNL</span> Panel/Control</div>
      <div><span class="dp-child-type type-jb">JB</span> Junction Box</div>
      <div><span class="dp-child-type type-xfmr">XFMR</span> Transformer</div>
      <div><span class="dp-child-type type-spl">SPL</span> Splitter</div>
    </div>
    <div class="modal-acts"><button class="mbtn mbtn-s" onclick="closeLegend()">Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-import" accept=".json" style="display:none" onchange="handleImport(event)">

// Load saved state or use raw data
let mccData = JSON.parse(localStorage.getItem('mcc-visual-v1') || 'null') || deepClone(RAW_MCC);

function deepClone(o){return JSON.parse(JSON.stringify(o));}
function save(){localStorage.setItem('mcc-visual-v1', JSON.stringify(mccData));}

// ── STATE ─────────────────────────────────────────────────────────────────
let currentMCC  = null;
let selectedPos = null;
let editChildIdx = -1;
let editChildBucketPos = null;

const CHILD_FIELDS = {
  MTR: [
    {id:'hp',    label:'HP',           placeholder:'20'},
    {id:'volt',  label:'Voltage (V)',   placeholder:'600'},
    {id:'rpm',   label:'RPM',           placeholder:'1800'},
    {id:'frame', label:'Frame',         placeholder:'256T'},
    {id:'fla',   label:'FLA (A)',        placeholder:'28'},
    {id:'overload',label:'Overload (A)',placeholder:'26'},
    {id:'sf',    label:'Service Factor',placeholder:'1.15'},
    {id:'enc',   label:'Enclosure',     placeholder:'TEFC'},
    {id:'bde',   label:'Drive End Brg', placeholder:'6308-ZZ-C3'},
    {id:'bfe',   label:'Fan End Brg',   placeholder:'6308-ZZ-C3'},
    {id:'mfr',   label:'Manufacturer',  placeholder:'WEG'},
    {id:'model', label:'Model / Part#', placeholder:''},
    {id:'serial',label:'Serial #',      placeholder:''},
    {id:'notes', label:'Notes',         placeholder:'',type:'textarea'},
  ],
  VFD: [
    {id:'brand', label:'Brand / Model', placeholder:'AB PowerFlex 525'},
    {id:'hp',    label:'HP Rating',     placeholder:'20'},
    {id:'volt',  label:'Input Voltage', placeholder:'600'},
    {id:'params',label:'Params Backed Up?', placeholder:'NO'},
    {id:'serial',label:'Serial #',      placeholder:''},
    {id:'notes', label:'Notes',         placeholder:'',type:'textarea'},
  ],
  LD: [
    {id:'size',  label:'Ampere Rating', placeholder:'60A'},
    {id:'type',  label:'Type',          placeholder:'Fusible / Non-fusible'},
    {id:'fuse',  label:'Fuse Size',     placeholder:'60A / Class J'},

    {id:'nema',  label:'NEMA Enclosure',placeholder:'NEMA 12'},

    {id:'notes', label:'Notes',         placeholder:'',type:'textarea'},
  ],
  PNL: [
    {id:'volt',  label:'Voltage',       placeholder:'600/120V'},
    {id:'main',  label:'Main Breaker',  placeholder:'100A'},
    {id:'spaces',label:'Spaces',        placeholder:'12'},
    {id:'type',  label:'Type',          placeholder:'Load Center / Dist Panel'},

  ],

  ],
  XFMR: [
    {id:'kva',   label:'KVA Rating',    placeholder:'5'},
    {id:'primary',label:'Primary (V)',  placeholder:'600'},
    {id:'secondary',label:'Secondary (V)',placeholder:'120/240'},
    {id:'mfr',   label:'Manufacturer',  placeholder:''},
    {id:'notes', label:'Notes',         placeholder:'',type:'textarea'},
  ],
  SPL: [
    {id:'feeds', label:'# of Feeds',    placeholder:'4'},
    {id:'size',  label:'Main Size (A)', placeholder:'200'},
    {id:'notes', label:'Notes',         placeholder:'',type:'textarea'},
  ],
};

const TYPE_ICON = {MTR:'🔴',VFD:'🔵',LD:'🟢',PNL:'🟣',JB:'⚪',XFMR:'🟡',SPL:'🟠'};
const TYPE_LABEL= {MTR:'MOTOR',VFD:'VFD',LD:'LOCAL DISC',PNL:'PANEL',JB:'J-BOX',XFMR:'XFMR',SPL:'SPLITTER'};
const TYPE_CSS  = {MTR:'type-mtr',VFD:'type-vfd',LD:'type-ld',PNL:'type-pnl',JB:'type-jb',XFMR:'type-xfmr',SPL:'type-spl'};

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('mcc-sel');
  Object.keys(mccData).sort().forEach(mcc => {
    const o = document.createElement('option');
    o.value = mcc; o.textContent = mcc + ' (' + mccData[mcc].length + ' buckets)';
    sel.appendChild(o);
  });
});

// ── MCC SELECTION ─────────────────────────────────────────────────────────
function selectMCC(mcc) {
  if (!mcc) return;
  currentMCC  = mcc;
  selectedPos = null;
  closeDetail();
  renderList();
  renderVisual();
}

// ── BUCKET LIST ───────────────────────────────────────────────────────────
function renderList() {
  if (!currentMCC) return;
  const q    = document.getElementById('sb-q').value.toLowerCase();
  const filt = document.getElementById('sb-filter').value;
  const buckets = mccData[currentMCC] || [];

  const filtered = buckets.filter(b => {
    const matchQ = !q || b.desc.toLowerCase().includes(q) || b.pos.toLowerCase().includes(q);
    const matchF = !filt || (b.children||[]).some(c => c.type === filt) ||
      (filt==='VFD' && b.vfd);
    return matchQ && matchF;
  });

  const list = document.getElementById('bucket-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="no-buckets">No buckets match</div>';
    return;
  }

  list.innerHTML = filtered.map(b => {
    const children = b.children || [];
    const hasVfd = b.vfd || children.some(c=>c.type==='VFD');
    const isActive = b.pos === selectedPos;
    const isExpanded = b._expanded;
    const childrenHTML = children.map((c,ci) => `
      <div class="bl-child">
        <span class="bl-child-icon">${TYPE_ICON[c.type]||'⚪'}</span>
        <span class="bl-child-name">${c.name||c.type}</span>
        <span class="bl-child-edit" onclick="event.stopPropagation();openEditChild('${b.pos}',${ci})">✎</span>
      </div>`).join('');

    return `<div class="bl-item ${isActive?'active':''} ${isExpanded?'expanded':''}" id="bli-${b.pos}">
      <div class="bl-header" onclick="onListClick('${b.pos}')">
        <span class="bl-pos">${b.pos}</span>
        <div style="flex:1;min-width:0">
          <div class="bl-desc">${b.desc}</div>
          <div class="bl-meta">${b.hp?b.hp+'HP · ':''}${b.volt||'600'}V${hasVfd?' · VFD':''}</div>
        </div>
        ${children.length?`<span class="bl-chevron">▶</span>`:''}
      </div>
      ${children.length||isActive?`<div class="bl-children">
        ${childrenHTML}
        <div class="bl-add-child" onclick="event.stopPropagation();openAddChild('${b.pos}')">+ Add equipment</div>
      </div>`:''}
    </div>`;
  }).join('');
}

function onListClick(pos) {
  const bucket = getBucket(pos);
  if (!bucket) return;

  // toggle expanded in list
  bucket._expanded = !bucket._expanded;

  // select & highlight
  selectedPos = pos;
  renderList();
  renderVisual();
  openDetail(pos);
  scrollToBucket(pos);
}

// ── VISUAL MCC ────────────────────────────────────────────────────────────
function renderVisual() {
  if (!currentMCC) return;
  const buckets = mccData[currentMCC] || [];
  const wrap = document.getElementById('mcc-wrap');

  // group by column
  const cols = {};
  buckets.forEach(b => {
    if (!cols[b.col]) cols[b.col] = [];
    cols[b.col].push(b);
  });
  const colNums = Object.keys(cols).map(Number).sort((a,b)=>a-b);
  const unitH = 48; // px per unit

  let html = `
    <div class="mcc-title"><span>${currentMCC}</span></div>
    <div class="mcc-subtitle">${buckets.length} BUCKETS · ${colNums.length} COLUMNS</div>
    <div class="mcc-controls">
      <span class="mcc-ctrl-label">COLUMN WIDTH (px):</span>
      <input class="mcc-ctrl-input" type="number" id="col-w-inp" value="130" min="80" max="300" oninput="updateColWidth(this.value)">
      <span class="mcc-ctrl-label" style="margin-left:10px">UNIT HEIGHT (px):</span>
      <input class="mcc-ctrl-input" type="number" id="unit-h-inp" value="48" min="24" max="120" oninput="updateUnitH(this.value)">
    </div>
    <div class="mcc-cabinet" id="mcc-cabinet">
      <div class="mcc-cabinet-label">${currentMCC} CABINET LAYOUT</div>`;

  colNums.forEach(colNum => {
    const colBuckets = cols[colNum].sort((a,b) => a.row.localeCompare(b.row));
    html += `<div class="mcc-col">
      <div class="mcc-col-label">C${colNum}</div>`;

    colBuckets.forEach(b => {
      const h = (b.height||1) * unitH;
      const isHL  = b.pos === selectedPos;
      const hasC  = (b.children||[]).length > 0;
      const hasVfd= b.vfd || (b.children||[]).some(c=>c.type==='VFD');
      const cls   = [
        'mcc-bucket',
        isHL  ? 'highlighted' : '',
        hasC  ? 'has-children': '',
        hasVfd && !hasC ? 'vfd' : '',
      ].filter(Boolean).join(' ');

      html += `<div class="${cls}" id="mb-${b.pos}"
        style="height:${h}px"
        onclick="onBucketClick('${b.pos}')"
        title="${b.pos} — ${b.desc}">
        <div class="mb-pos">${b.pos}</div>
        <div class="mb-desc">${b.desc}</div>
        ${b.hp ? `<div class="mb-hp">${b.hp}HP${b.volt?' · '+b.volt+'V':''}</div>` : ''}
        <div class="mb-indicator">
          ${hasC ? '<div class="mb-dot" style="background:var(--green)"></div>' : ''}
          ${hasVfd ? '<div class="mb-dot" style="background:var(--blue)"></div>' : ''}
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  wrap.innerHTML = html;
}

function onBucketClick(pos) {
  selectedPos = pos;
  const bucket = getBucket(pos);
  if (bucket) bucket._expanded = true;
  renderList();
  renderVisual();
  openDetail(pos);
  // scroll list item into view
  const li = document.getElementById('bli-'+pos);
  if (li) li.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function scrollToBucket(pos) {
  setTimeout(() => {
    const el = document.getElementById('mb-'+pos);
    if (el) el.scrollIntoView({block:'center',inline:'center',behavior:'smooth'});
  }, 50);
}

function updateColWidth(val) {
  document.documentElement.style.setProperty('--col-w', val+'px');
}
function updateUnitH(val) {
  // re-render with new unit height stored
  const unitH = parseInt(val) || 48;
  const cab = document.getElementById('mcc-cabinet');
  if (!cab) return;
  document.querySelectorAll('.mcc-bucket').forEach(el => {
    const pos = el.id.replace('mb-','');
    const b = getBucket(pos);
    if (b) el.style.height = ((b.height||1)*unitH)+'px';
  });
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────
function openDetail(pos) {
  const b = getBucket(pos);
  if (!b) return;
  document.getElementById('dp-pos').textContent  = pos + ' — ' + currentMCC;
  document.getElementById('dp-desc').textContent = b.desc;
  document.getElementById('dp-mcc').textContent  = (b.transformer||'') + (b.pdc?' → '+b.pdc:'');

  const body = document.getElementById('dp-body');
  const children = b.children || [];

  body.innerHTML = `
    <div class="dp-sec">Bucket Info</div>
    ${dpRow('Position', b.pos)}
    ${dpRow('Voltage', b.volt||'600V')}
    ${dpRow('HP', b.hp||'—')}
    ${dpRow('Breaker', b.breaker||'—')}
    ${dpRow('Fuse', b.fuse||'—')}
    ${dpRow('VFD Drive', b.vfd||'—')}
    <div class="dp-row">
      <span class="dp-key">HEIGHT (units)</span>
      <div class="dp-height-ctrl">
        <button onclick="changeBucketHeight('${pos}',-1)">−</button>
        <span class="dp-height-val" id="dp-h-val">${b.height||1}</span>
        <button onclick="changeBucketHeight('${pos}',1)">+</button>
      </div>
    </div>

    <div class="dp-sec">Connected Equipment</div>
    ${children.map((c,i) => `
      <div class="dp-child" id="dpc-${i}">
        <div class="dp-child-hdr" onclick="toggleChild(${i})">
          <span class="dp-child-icon">${TYPE_ICON[c.type]||'⚪'}</span>
          <span class="dp-child-name">${c.name||c.type}</span>
          <span class="dp-child-type ${TYPE_CSS[c.type]||''}">${TYPE_LABEL[c.type]||c.type}</span>
        </div>
        <div class="dp-child-body">
          ${Object.entries(c).filter(([k])=>!['type','name','_id'].includes(k)&&c[k]).map(([k,v])=>
            `<div class="dp-child-row"><span class="dp-child-key">${k.toUpperCase()}</span><span class="dp-child-val">${v}</span></div>`
          ).join('')}
          <div style="margin-top:6px;display:flex;gap:6px">
            <button class="dp-add-btn" style="flex:1" onclick="openEditChild('${pos}',${i})">✎ Edit</button>
          </div>
        </div>
      </div>`).join('')}
    <button class="dp-add-btn" onclick="openAddChild('${pos}')">+ Add Equipment to this Bucket</button>
  `;

  document.getElementById('detail-panel').classList.remove('collapsed');
}

function dpRow(key, val) {
  return `<div class="dp-row"><span class="dp-key">${key}</span><span class="dp-val">${val}</span></div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('collapsed');
  selectedPos = null;
}

function toggleChild(i) {
  const el = document.getElementById('dpc-'+i);
  if (el) el.classList.toggle('open');
}

function changeBucketHeight(pos, delta) {
  const b = getBucket(pos);
  if (!b) return;
  b.height = Math.max(1, Math.min(10, (b.height||1) + delta));
  document.getElementById('dp-h-val').textContent = b.height;
  save();
  // update visual height
  const unitH = parseInt(document.getElementById('unit-h-inp')?.value)||48;
  const el = document.getElementById('mb-'+pos);
  if (el) el.style.height = (b.height * unitH)+'px';
  toast('Height updated: '+b.height+' units');
}

// ── ADD / EDIT CHILD ──────────────────────────────────────────────────────
function openAddChild(pos) {
  editChildBucketPos = pos;
  editChildIdx = -1;
  document.getElementById('add-modal-title').textContent = 'Add Equipment to ' + pos;
  document.getElementById('child-name').value = '';
  document.getElementById('child-type').value = 'MTR';
  document.getElementById('btn-del-child').style.display = 'none';
  updateChildFields();
  document.getElementById('add-modal').classList.add('show');
}

function openEditChild(pos, idx) {
  editChildBucketPos = pos;
  editChildIdx = idx;
  const b = getBucket(pos);
  const c = b.children[idx];
  document.getElementById('add-modal-title').textContent = 'Edit Equipment — ' + pos;
  document.getElementById('child-type').value = c.type;
  document.getElementById('child-name').value = c.name||'';
  document.getElementById('btn-del-child').style.display = 'inline-block';
  updateChildFields(c);
  document.getElementById('add-modal').classList.add('show');
}

function updateChildFields(existing) {
  const type   = document.getElementById('child-type').value;
  const fields = CHILD_FIELDS[type] || [];
  document.getElementById('child-fields').innerHTML = fields.map(f => `
    <div class="mf">
      <label>${f.label}</label>
      ${f.type==='textarea'
        ? `<textarea id="cf-${f.id}" placeholder="${f.placeholder}">${existing&&existing[f.id]||''}</textarea>`
        : `<input type="text" id="cf-${f.id}" placeholder="${f.placeholder}" value="${existing&&existing[f.id]||''}">`}
    </div>`).join('');
}

function saveChild() {
  const type  = document.getElementById('child-type').value;
  const name  = document.getElementById('child-name').value.trim();
  const fields= CHILD_FIELDS[type]||[];
  const child = {type, name};
  fields.forEach(f => {
    const el = document.getElementById('cf-'+f.id);
    if (el && el.value.trim()) child[f.id] = el.value.trim();
  });

  const b = getBucket(editChildBucketPos);
  if (!b.children) b.children = [];
  if (editChildIdx >= 0) b.children[editChildIdx] = child;
  else b.children.push(child);

  save(); closeAddModal();
  renderList(); renderVisual(); openDetail(editChildBucketPos);
  toast('✓ Equipment saved');
}

function deleteChild() {
  const b = getBucket(editChildBucketPos);
  if (!b||editChildIdx<0) return;
  if (!confirm('Delete this equipment?')) return;
  b.children.splice(editChildIdx,1);
  save(); closeAddModal();
  renderList(); renderVisual(); openDetail(editChildBucketPos);
  toast('🗑 Equipment deleted');
}

function closeAddModal() { document.getElementById('add-modal').classList.remove('show'); }

// ── HELPERS ───────────────────────────────────────────────────────────────
function getBucket(pos) {
  if (!currentMCC) return null;
  return (mccData[currentMCC]||[]).find(b => b.pos === pos);
}

function toggleLegend() { document.getElementById('legend-modal').classList.add('show'); }
function closeLegend()  { document.getElementById('legend-modal').classList.remove('show'); }

function exportData() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(mccData,null,2)],{type:'application/json'}));
  a.download = 'mcc-layout-' + new Date().toISOString().split('T')[0] + '.json';
  a.click(); toast('✓ Data exported');
}
function importData() { document.getElementById('file-import').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      mccData = JSON.parse(ev.target.result);
      save();
      location.reload();
    } catch { toast('✗ Invalid JSON file', true); }
  };
  reader.readAsText(file);
}

let toastT;
function toast(msg, err) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.borderColor=err?'var(--red)':'var(--green)';
  t.style.color=err?'var(--red)':'var(--green)'; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
